# Terminal overrides: Cmd+C/V/X need Ctrl+Shift+C/V/X in terminals
[konsole]

mac.c = C-S-c
mac.v = C-S-v
mac.x = C-S-x

# VSCode overrides: Ctrl+X/C/V/T are chord prefixes, so keyd
# remaps them to Alt variants; Cmd+X/C/V send Ctrl+Shift for clipboard
[code*]

mac.c = C-S-c
mac.x = C-S-x
mac.v = C-S-v

control.x = A-x
control.c = A-c
control.v = A-v
control.t = A-t

[emacs*]

mac.c = C-S-c
mac.x = C-S-x
