# Terminal overrides: Cmd+C/V/X need Ctrl+Shift+C/V/X in terminals
[konsole]

mac.c = C-S-c
mac.v = C-S-v
mac.x = C-S-x

# VSCode/Emacs overrides: Ctrl+X/C/T are chord prefixes, so
# Cmd+X/C/T must send Ctrl+Shift variants for cut/copy/new-tab
[code*]

mac.c = C-S-c
mac.x = C-S-x

[emacs*]

mac.c = C-S-c
mac.x = C-S-x
