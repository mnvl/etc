[ids]
*

[main]
# Super acts as macOS "Cmd" key
leftmeta = layer(mac)
rightmeta = layer(mac)

# Alt acts as macOS "Option" key for word-level nav
leftalt = layer(option)
rightalt = layer(option)

[mac]
# Core editing
c = C-c
v = C-v
x = C-x
a = C-a
z = C-z
shift+z = C-S-z

# Save, Find, Print/QuickOpen
s = C-s
f = C-f
g = C-g
shift+g = C-S-g
p = C-p
o = C-o
e = C-e

# Tabs & Windows
t = C-t
w = C-w
shift+t = C-S-t
n = C-n
shift+n = C-S-n
q = C-q
1 = C-1
2 = C-2
3 = C-3
4 = C-4
5 = C-5
6 = C-6
7 = C-7
8 = C-8
9 = C-9
tab = A-tab
shift+tab = A-S-tab

# Reload, Address bar
r = C-r
shift+r = C-S-r
l = C-l

# Formatting
b = C-b
i = C-i
u = C-u

# Cmd+Arrow: line/document navigation (macOS style)
left = home
right = end
up = C-home
down = C-end
shift+left = S-home
shift+right = S-end
shift+up = C-S-home
shift+down = C-S-end

# Cmd+Backspace: delete to start of line
backspace = S-home+delete

# Cmd+Delete: delete to end of line (forward)
delete = S-end+delete

# Zoom
equal = C-equal
minus = C-minus
0 = C-0

# Screenshot (Cmd+Shift+3/4)
shift+3 = print
shift+4 = S-print

# Cmd+/ (toggle comment in editors)
/ = C-/

# Cmd+Enter (e.g. send, submit)
enter = C-enter

[option]
# Option+Arrow: word navigation
left = C-left
right = C-right
shift+left = C-S-left
shift+right = C-S-right

# Option+Backspace: delete word backward
backspace = C-backspace

# Option+Delete: delete word forward
delete = C-delete
